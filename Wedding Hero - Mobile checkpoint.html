function BackgroundVideo() {
  const videoRef = useRef(null);
  const rafRef = useRef(null);
  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    const FADE = 0.5;
    const tick = () => {
      if (!video.duration || isNaN(video.duration)) {rafRef.current = requestAnimationFrame(tick);return;}
      const t = video.currentTime,dur = video.duration;
      if (t < FADE) video.style.opacity = (t / FADE).toFixed(3);else
      if (t > dur - FADE) video.style.opacity = ((dur - t) / FADE).toFixed(3);else
      video.style.opacity = '1';
      rafRef.current = requestAnimationFrame(tick);
    };
    const handleEnded = () => {video.style.opacity = '0';setTimeout(() => {video.currentTime = 0;video.play().catch(() => {});}, 100);};
    video.style.opacity = '0';
    video.play().catch(() => {});
    rafRef.current = requestAnimationFrame(tick);
    video.addEventListener('ended', handleEnded);
    return () => {cancelAnimationFrame(rafRef.current);video.removeEventListener('ended', handleEnded);};
  }, []);
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 0, overflow: 'hidden' }}>
      <video ref={videoRef} src="bg.mp4" muted playsInline preload="auto"
      style={{ opacity: 0, width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.7) 100%)', pointerEvents: 'none' }} />
    </div>);

}

function App() {
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaksState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);
  return (
    <div style={{ background: 'var(--cream)' }}>
      <HeroSection headingAlign={tweaks.headingAlign} showDate={tweaks.showDate} />
      <SecondSection />
      <ThirdSection />
      <FourthSection />
      <FifthSection />
      <SixthSection />
      <SeventhSection />
      <TweaksPanel open={tweaksOpen} onClose={() => {setTweaksOpen(false);window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');}} tweaks={tweaks} setTweak={setTweak} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
